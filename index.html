<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>모임 레퍼런스 찾기 | 넷플연가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #000; --white: #FFF;
  --g50: #FAFAFA; --g100: #F5F5F5; --g200: #EEE; --g300: #E0E0E0;
  --g400: #BDBDBD; --g500: #9E9E9E; --g600: #757575; --g700: #616161; --g800: #424242;
  --warm: #FF6B35; --warm-bg: #FFF8F5;
  --green-bg: #E8F5E9; --blue: #5E7EFE; --blue-bg: #EEF2FF;
  --font: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font); background: var(--black); color: var(--black); line-height: 1.5; }

#app { max-width: 480px; margin: 0 auto; background: var(--white); min-height: 100vh; min-height: 100dvh; }

/* Progress */
.prog { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 3px; background: var(--g200); z-index: 100; }
.prog-fill { height: 100%; background: var(--black); transition: width 0.5s ease; border-radius: 0 2px 2px 0; }

/* Screen */
.scr { display: none; animation: up 0.35s ease; }
.scr.on { display: block; }
@keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

/* ===== LANDING ===== */
.land {
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  background: var(--black); color: var(--white);
  padding: 0 24px;
  text-align: center;
}
.land-top { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 60px; }
.land-logo { font-size: 11px; font-weight: 600; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 40px; }
.land-emoji { font-size: 48px; margin-bottom: 20px; }
.land-title { font-size: 26px; font-weight: 800; line-height: 1.4; margin-bottom: 14px; word-break: keep-all; }
.land-sub { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.7; max-width: 280px; margin: 0 auto 32px; word-break: keep-all; }
.land-steps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin-bottom: 40px; }
.land-step { display: flex; align-items: center; gap: 12px; text-align: left; }
.land-step-num { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); flex-shrink: 0; }
.land-step-text { font-size: 14px; color: rgba(255,255,255,0.7); }
.land-bottom { padding: 0 0 calc(32px + env(safe-area-inset-bottom)); }
.btn-land { display: flex; align-items: center; justify-content: center; width: 100%; height: 56px; background: var(--white); color: var(--black); border: none; border-radius: 14px; font-family: var(--font); font-size: 17px; font-weight: 700; cursor: pointer; transition: transform 0.12s, opacity 0.12s; }
.btn-land:active { transform: scale(0.97); opacity: 0.9; }
.land-footer { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 12px; }

/* ===== CONTENT SCREENS ===== */
.content { padding: 20px 24px 40px; }
.back { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; font-family: var(--font); font-size: 14px; color: var(--g600); cursor: pointer; padding: 12px 0; }
.hdr { text-align: center; margin-bottom: 24px; padding-top: 4px; }
.hdr-label { font-size: 12px; font-weight: 600; color: var(--warm); letter-spacing: 0.5px; margin-bottom: 6px; }
.hdr-title { font-size: 22px; font-weight: 800; line-height: 1.35; margin-bottom: 8px; word-break: keep-all; }
.hdr-sub { font-size: 14px; color: var(--g600); line-height: 1.6; }

/* Category */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cat-card {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 10px; border: 1.5px solid var(--g200); border-radius: 16px;
  background: var(--white); cursor: pointer; transition: all 0.15s; text-align: center;
}
.cat-card:active { transform: scale(0.97); }
.cat-emoji { font-size: 28px; margin-bottom: 6px; }
.cat-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.cat-count { font-size: 11px; color: var(--g500); }

/* Meetup Card */
.mc { background: var(--white); border: 1px solid var(--g200); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
.mc.open { border-color: var(--g400); }
.mc-top { display: flex; align-items: flex-start; }
.mc-info { flex: 1; min-width: 0; }
.mc-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
.mc-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 12px; color: var(--g500); flex-wrap: wrap; }
.mc-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--g400); flex-shrink: 0; }
.mc-fill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; background: var(--green-bg); color: #2E7D32; }
.mc-chev { width: 16px; height: 16px; color: var(--g400); transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; margin-top: 4px; }
.mc.open .mc-chev { transform: rotate(180deg); }
.mc-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.mc-tag { padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 500; background: var(--g100); color: var(--g600); }
.mc-body { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--g100); }
.mc.open .mc-body { display: block; }

/* Session */
.ss { padding: 8px 0; border-bottom: 1px solid var(--g100); }
.ss:last-child { border-bottom: none; }
.ss-n { font-size: 10px; font-weight: 700; color: var(--warm); }
.ss-t { font-size: 13px; font-weight: 600; line-height: 1.4; margin-top: 1px; }
.ss-d { font-size: 12px; color: var(--g600); line-height: 1.5; margin-top: 3px; }
.ss-section { margin-top: 6px; }
.ss-section-label { font-size: 11px; font-weight: 600; color: var(--warm); margin-bottom: 2px; }
.ss-section-item { font-size: 12px; color: var(--g600); line-height: 1.5; padding-left: 10px; }

/* Insight */
.ins { display: flex; gap: 8px; padding: 10px 12px; background: var(--warm-bg); border-radius: 8px; margin-top: 10px; font-size: 12px; line-height: 1.6; color: var(--g700); }

/* Pills */
.pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.pill { padding: 3px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; background: var(--green-bg); color: #2E7D32; }

/* Season */
.szn { display: inline-flex; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--blue-bg); color: var(--blue); margin-left: 4px; vertical-align: middle; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: var(--white); padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 200; }
.toast.vis { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== TIPS SCREEN ===== */
.tips-grid { display: flex; flex-direction: column; gap: 14px; }
.tip-card {
  background: var(--white); border: 1.5px solid var(--g200); border-radius: 14px;
  padding: 18px; transition: border-color 0.15s;
}
.tip-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.tip-icon { font-size: 24px; flex-shrink: 0; }
.tip-title-wrap { flex: 1; }
.tip-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
.tip-stars { font-size: 11px; color: var(--warm); margin-top: 2px; }
.tip-bullets { list-style: none; padding: 0; }
.tip-bullets li { position: relative; padding-left: 14px; font-size: 13px; color: var(--g700); line-height: 1.6; margin-bottom: 4px; word-break: keep-all; }
.tip-bullets li::before { content: ''; position: absolute; left: 0; top: 9px; width: 4px; height: 4px; border-radius: 50%; background: var(--g400); }
.tip-card.avoid { border-color: #FFE0E0; background: #FFF8F8; }
.tip-card.avoid .tip-bullets li::before { background: #E57373; }
.tip-card.structure { border-color: #E0EDFF; background: #F5F9FF; }
.tip-card.structure .tip-bullets li::before { background: var(--blue); }
.tip-card.good { border-color: #D4EDDA; background: #F4FFF6; }
.tip-card.good .tip-bullets li::before { background: #2E7D32; }

/* ===== D: CATEGORY INSIGHT BANNER ===== */
.cat-insight { background: var(--warm-bg); border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; }
.cat-insight-label { font-size: 11px; font-weight: 700; color: var(--warm); letter-spacing: 0.5px; margin-bottom: 6px; }
.cat-insight-text { font-size: 13px; color: var(--g700); line-height: 1.7; word-break: keep-all; }
.cat-insight-text strong { color: var(--black); font-weight: 700; }

/* ===== A: PATTERN VISUAL ===== */
.pat-flow { display: flex; gap: 0; margin: 16px 0; position: relative; }
.pat-step { flex: 1; text-align: center; position: relative; }
.pat-bar { height: 6px; border-radius: 3px; margin: 0 2px 8px; }
.pat-num { font-size: 10px; font-weight: 700; color: var(--warm); margin-bottom: 2px; }
.pat-label { font-size: 12px; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
.pat-desc { font-size: 10px; color: var(--g500); line-height: 1.4; }
.pat-arrow { position: absolute; right: -6px; top: -2px; font-size: 10px; color: var(--g400); }
.pat-card { background: var(--white); border: 1.5px solid var(--g200); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.pat-card-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.pat-card-badge { padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; }

/* ===== B: BEFORE/AFTER ===== */
.ba-card { border-radius: 14px; padding: 16px; margin-bottom: 10px; }
.ba-before { background: #FFF8F8; border: 1.5px solid #FFE0E0; }
.ba-after { background: #F4FFF6; border: 1.5px solid #D4EDDA; }
.ba-label { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
.ba-before .ba-label { color: #E57373; }
.ba-after .ba-label { color: #2E7D32; }
.ba-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.ba-desc { font-size: 12px; color: var(--g600); line-height: 1.6; }
.ba-highlight { background: rgba(46,125,50,0.08); padding: 1px 4px; border-radius: 3px; font-weight: 600; color: #2E7D32; }
.ba-strike { text-decoration: line-through; color: var(--g400); }
.ba-point { display: flex; gap: 6px; padding: 10px 12px; background: var(--blue-bg); border-radius: 8px; margin-top: 8px; font-size: 12px; line-height: 1.6; color: var(--g700); }

/* ===== C: CHECKLIST ===== */
.ck-list { display: flex; flex-direction: column; gap: 6px; }
.ck-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: var(--g50); border-radius: 10px; cursor: pointer; transition: all 0.15s; user-select: none; }
.ck-item.checked { background: var(--green-bg); }
.ck-box { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--g300); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
.ck-item.checked .ck-box { background: #2E7D32; border-color: #2E7D32; color: white; }
.ck-text { font-size: 13px; color: var(--g700); line-height: 1.5; word-break: keep-all; }
.ck-item.checked .ck-text { color: #2E7D32; }
.ck-score { text-align: center; padding: 20px; margin-top: 16px; }
.ck-score-num { font-size: 40px; font-weight: 800; }
.ck-score-label { font-size: 13px; color: var(--g500); margin-top: 4px; }

.btn-next { display: flex; align-items: center; justify-content: center; width: 100%; height: 50px; background: var(--black); color: var(--white); border: none; border-radius: 12px; font-family: var(--font); font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: transform 0.12s, opacity 0.12s; }
.btn-next:active { transform: scale(0.97); opacity: 0.9; }
</style>
</head>

let step=0, cat='';
const pf=document.getElementById('pf'), root=document.getElementById('root'), toastEl=document.getElementById('toast');

function go(s,c){
  step=s; if(c) cat=c;
  pf.style.width=[0,14,30,50,70,85,100][s]+'%';
  const el=root;
  if(s===0) landing(el);
  else if(s===1) cats(el);
  else if(s===2) tips(el);
  else if(s===3) checklist(el);
  else if(s===4) list(el);
  else if(s===5) patterns(el);
  else beforeAfter(el);
  window.scrollTo(0,0);
}

function toggleCk(i) {
  const el = document.getElementById('ck'+i);
  el.classList.toggle('checked');
  const total = 10;
  const checked = document.querySelectorAll('.ck-item.checked').length;
  document.getElementById('ckNum').textContent = checked + ' / ' + total;
  const labels = ['체크항목을 눌러보세요','아직 보완할 부분이 많아요','좋은 방향이에요, 조금 더!','거의 다 왔어요!','훌륭한 커리큘럼이에요! 🎉'];
  const li = checked<=2?0:checked<=5?1:checked<=7?2:checked<=9?3:4;
  document.getElementById('ckLabel').textContent = labels[li];
  const colors = ['var(--g500)','#E57373','var(--warm)','var(--blue)','#2E7D32'];
  document.getElementById('ckNum').style.color = colors[li];
}
